<!doctype html><html lang=en><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>:root {
  --mono: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  --serif: "Instrument Serif", Georgia, serif;
  /* PnL semantics — identical in every theme, never repurposed for chrome */
  --green: #3dff7c;  --red: #ff5c5c;
  --green-soft: rgba(61,255,124,0.1);  --red-soft: rgba(255,92,92,0.1);
  /* PHOSPHOR (default) */
  --bg: #050705; --bg-panel: #0a0f0b; --bg-inset: #0d130e;
  --line: #1d2c21; --line-soft: #131f17;
  --fg: #d2e8d7; --fg-dim: #5e7c68; --fg-faint: #38503f;
  --accent: #3dff7c; --amber: #ecc452; --blue: #6aa6ff; --violet: #b48cff;
  --glow: 0 0 22px rgba(61,255,124,0.25);
}
[data-theme="amber"] {   /* XAU·EA default — gold */
  --bg: #0a0805; --bg-panel: #110d07; --bg-inset: #16110a;
  --line: #2f2516; --line-soft: #201a0f;
  --fg: #ecdfc2; --fg-dim: #8d7c57; --fg-faint: #564b34;
  --accent: #ffb000; --amber: #ffb000; --blue: #6aa6ff; --violet: #c79bff;
  --glow: 0 0 22px rgba(255,176,0,0.25);
}
[data-theme="cyan"] {
  --bg: #04080f; --bg-panel: #071120; --bg-inset: #0a1628;
  --line: #16283f; --line-soft: #0f1d30;
  --fg: #cfe2f0; --fg-dim: #5e7c95; --fg-faint: #38505f;
  --accent: #4dd8ff; --amber: #ffd166; --blue: #4dd8ff; --violet: #ff4dd8;
  --glow: 0 0 22px rgba(77,216,255,0.25);
}
[data-theme="violet"] {
  --bg: #0a0612; --bg-panel: #120a1e; --bg-inset: #170e27;
  --line: #2b1d43; --line-soft: #1e1431;
  --fg: #ddd2f0; --fg-dim: #8a78a8; --fg-faint: #564a70;
  --accent: #b48cff; --amber: #f0c060; --blue: #7aa6ff; --violet: #ff6ec7;
  --glow: 0 0 22px rgba(180,140,255,0.28);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--mono);
  background: var(--bg); color: var(--fg);
  font-size: 12px; line-height: 1.45; letter-spacing: 0.01em;
  display: flex; flex-direction: column; min-height: 100vh;
}
[hidden] { display: none !important; }

/* scanlines — fixed 1px grid over everything */
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
}
/* vignette — accent glow top, darkness bottom */
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 998;
  background:
    radial-gradient(120% 90% at 50% -10%, color-mix(in srgb, var(--accent) 5%, transparent), transparent 55%),
    radial-gradient(140% 120% at 50% 115%, rgba(0,0,0,0.55), transparent 60%);
}

@keyframes rise     { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
@keyframes flicker  { 0%,96.5%,98.5%,100% { opacity: 1; } 97.5% { opacity: .82; } }
@keyframes pulse    { 0%,100% { opacity: 1; } 50% { opacity: .22; } }
@keyframes glyphspin{ to { transform: rotate(360deg); } }
@keyframes marquee-loop { from { transform: translateX(0); } to { transform: translateX(-50%); } }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--line); }
::-webkit-scrollbar-track { background: transparent; }

@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

.topbar { display: flex; align-items: stretch; border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 6%, var(--bg-panel)), var(--bg-panel)); }
.brand { display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  border-right: 1px solid var(--line); white-space: nowrap; }
.brand-glyph { color: var(--accent); font-size: 17px; text-shadow: var(--glow);
  animation: glyphspin 14s linear infinite; }
.brand-stack { display: flex; flex-direction: column; line-height: 1.25; }
.brand-name { font-weight: 700; font-size: 14px; letter-spacing: 0.26em; }
.brand-sub { color: var(--fg-dim); font-size: 8px; letter-spacing: 0.2em; }

/* seamless marquee: track holds TWO identical halves, slide one half */
.topticker { flex: 1; align-self: center; overflow: hidden; white-space: nowrap;
  font-size: 10.5px; color: var(--fg-dim); font-variant-numeric: tabular-nums;
  mask-image: linear-gradient(90deg, transparent 0, #000 28px, #000 calc(100% - 28px), transparent 100%); }
.topticker-track { display: inline-block; animation: marquee-loop 60s linear infinite; }
.topticker-track span { margin: 0 20px; }
.topticker-track b { color: var(--fg-faint); font-weight: 600; font-size: 8.5px; letter-spacing: 0.18em; margin-right: 5px; }

.topright { display: flex; align-items: center; gap: 11px; padding: 0 14px;
  border-left: 1px solid var(--line); white-space: nowrap; }
.chipbtn { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; color: var(--fg-dim);
  background: transparent; border: 1px solid var(--line); padding: 4px 9px; cursor: pointer;
  transition: color .15s, border-color .15s, box-shadow .15s; }
.chipbtn:hover { color: var(--fg); border-color: var(--fg-dim); }
.chipbtn.on { color: var(--accent); border-color: var(--accent); box-shadow: var(--glow); }
.live { display: flex; align-items: center; gap: 6px; font-size: 9px; letter-spacing: 0.2em; color: var(--accent); }
.livedot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: var(--glow);
  animation: pulse 1.6s ease-in-out infinite; }
.live.stale, .live.stale .livedot { color: var(--red); background: var(--red); }
.live.stale .livedot { animation: none; box-shadow: none; }
.clock { font-size: 11px; color: var(--fg-dim); font-variant-numeric: tabular-nums; }

.grid { display: grid; grid-template-columns: 295px 1fr 330px; gap: 8px; padding: 8px; flex: 1; }
.col { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.full { grid-column: 1 / -1; }
/* a filling panel: list scrolls instead of stretching the row */
.panel-fill { flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; }
.panel-fill .scroll { flex: 1; min-height: 0; overflow-y: auto; }

.panel { background: var(--bg-panel); border: 1px solid var(--line); position: relative;
  min-width: 0; animation: rise .55s ease both; }
/* corner brackets — only on hero panels */
.corner::before, .corner::after { content: ""; position: absolute; width: 10px; height: 10px; pointer-events: none; }
.corner::before { top: -1px; left: -1px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
.corner::after { bottom: -1px; right: -1px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }
.panel-head { display: flex; justify-content: space-between; align-items: center; gap: 8px;
  padding: 7px 10px; border-bottom: 1px solid var(--line-soft);
  font-size: 9px; font-weight: 600; letter-spacing: 0.2em; color: var(--fg-dim); }
.phint { font-weight: 400; color: var(--fg-faint); letter-spacing: 0.12em; }

.pnl-big { padding: 12px 14px 0; font-family: var(--serif); font-style: italic;
  font-size: 52px; line-height: 1.05; letter-spacing: -0.01em; color: var(--green);
  text-shadow: var(--glow); animation: flicker 9s infinite; }
.pnl-big.neg { color: var(--red); text-shadow: 0 0 22px rgba(255,92,92,.25); }
.pnl-dec { font-size: 28px; opacity: .65; }   /* decimals smaller than integer part */
.pnl-sub { padding: 2px 14px 10px; color: var(--fg-dim); font-size: 10.5px; display: flex; gap: 8px; flex-wrap: wrap; }

.kv-row { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--line-soft); }
.kv { padding: 7px 10px; border-right: 1px solid var(--line-soft); display: flex; flex-direction: column; gap: 1px;
  font-size: 11px; font-variant-numeric: tabular-nums; min-width: 0; overflow: hidden; }
.kv:last-child { border-right: 0; }
.klabel { font-size: 8px; letter-spacing: 0.18em; color: var(--fg-faint); }
/* state colors — reusable everywhere */
.pos { color: var(--green); } .neg { color: var(--red); }
.warn { color: var(--amber); } .muted { color: var(--fg-dim); } .dim { color: var(--fg-faint); }

.barrow { display: grid; grid-template-columns: 92px 1fr 38px; align-items: center; gap: 8px; font-size: 9.5px; padding: 3px 0; }
.barrow .bname { color: var(--fg-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.barrow .track { height: 5px; background: var(--bg-inset); position: relative; overflow: hidden; border: 1px solid var(--line-soft); }
.barrow .fill { position: absolute; inset: 0 auto 0 0; background: var(--accent); transition: width .6s ease; }
.barrow .fill.good { background: var(--green); } .barrow .fill.bad { background: var(--red); }
.barrow .bval { text-align: right; font-variant-numeric: tabular-nums; color: var(--fg); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 10px; font-variant-numeric: tabular-nums; }
thead th { position: sticky; top: 0; background: var(--bg-inset); color: var(--fg-faint);
  font-weight: 600; font-size: 8px; letter-spacing: .12em; text-align: left;
  padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
th.num, td.num { text-align: right; }
tbody td { padding: 5px 8px; border-bottom: 1px solid var(--line-soft); white-space: nowrap; }
tbody tr:hover { background: var(--bg-inset); }
.pill { font-size: 8px; font-weight: 700; letter-spacing: .1em; padding: 2px 6px; }
.pill.buy { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
.pill.sell { background: color-mix(in srgb, var(--violet) 14%, transparent); color: var(--violet); }

.feed-item { padding: 7px 10px; border-bottom: 1px solid var(--line-soft); display: flex; flex-direction: column; gap: 3px; cursor: pointer; }
.feed-item:hover { background: var(--bg-inset); }
.feed-top { display: flex; align-items: center; gap: 7px; font-size: 9px; }
.tag { font-size: 8px; font-weight: 700; letter-spacing: .14em; padding: 2px 5px; }
.tag.good { background: var(--green-soft); color: var(--green); }
.tag.bad  { background: var(--red-soft); color: var(--red); }
.feed-time { margin-left: auto; color: var(--fg-faint); font-variant-numeric: tabular-nums; }
.feed-reason { font-size: 9.5px; color: var(--fg-dim);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.statusbar { display: flex; justify-content: space-between; gap: 12px; padding: 5px 12px;
  border-top: 1px solid var(--line); background: var(--bg-panel);
  font-size: 9px; letter-spacing: .12em; color: var(--fg-faint); flex-wrap: wrap; }

.modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center;
  background: rgba(3,5,3,0.78); backdrop-filter: blur(3px); }
.modal-box { width: min(94vw, 720px); max-height: 92vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.6), var(--glow); }

@media (max-width: 1180px) {
  .grid { grid-template-columns: 260px 1fr; }
  .col-right { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; }
  .col-right .panel { flex: 1 1 280px; }
}
@media (max-width: 820px) {
  .grid { grid-template-columns: 1fr; }
  .col-right { flex-direction: column; }
  .topbar { flex-wrap: wrap; }
  .brand { border-right: 0; flex: 1; }
  .topright { border-left: 0; padding: 8px 12px; }
  .topticker { display: none; }       /* marquee needs width; panels carry the data */
  .pnl-big { font-size: 42px; }
  .panel-fill { flex: none; }
  .panel-fill .scroll { max-height: 320px; }
}
</style></head>
<body><!-- add data-theme="amber" for the gold skin -->
  <div class="vignette"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-glyph">◈</span>
      <div class="brand-stack">
        <span class="brand-name">BRAND</span>
        <span class="brand-sub">SUBTITLE · CONTEXT</span>
      </div>
    </div>
    <div class="topticker"><div class="topticker-track">
      <span><b>LABEL</b>value</span><span><b>LABEL</b>value</span><!-- repeat the set twice for seamless loop -->
    </div></div>
    <div class="topright">
      <button class="chipbtn" id="theme">THEME</button>
      <div class="live"><span class="livedot"></span>LIVE</div>
      <span class="clock">12:00:00</span>
    </div>
  </header>

  <main class="grid">
    <section class="col col-left">
      <div class="panel corner"><!-- hero panel gets corner brackets -->
        <div class="panel-head"><span>PERFORMANCE</span><span class="phint">NET REALIZED</span></div>
        <div class="pnl-big">+1,284<span class="pnl-dec">.50</span></div>
        <div class="pnl-sub"><span>win 62%</span><span>pf 1.8</span></div>
        <div class="kv-row">
          <div class="kv"><span class="klabel">CYCLES</span><span>148</span></div>
          <div class="kv"><span class="klabel">WIN</span><span class="pos">62%</span></div>
          <div class="kv"><span class="klabel">PF</span><span>1.80</span></div>
          <div class="kv"><span class="klabel">MAX DD</span><span class="neg">-4.2%</span></div>
        </div>
      </div>
    </section>

    <section class="col col-center">
      <div class="panel">
        <div class="panel-head"><span>CHART · LIVE</span><span class="phint">SOURCE</span></div>
        <!-- chart canvas / iframe; this panel flex:1 anchors row height -->
      </div>
    </section>

    <section class="col col-right">
      <div class="panel panel-fill">
        <div class="panel-head"><span>FEED</span><span class="phint" id="feed-count">0</span></div>
        <div class="scroll"><!-- .feed-item rows --></div>
      </div>
    </section>

    <div class="panel full">
      <div class="panel-head"><span>ALL ROWS</span><span class="phint">COUNT</span></div>
      <div class="table-wrap"><table><!-- thead.num / tbody --></table></div>
    </div>
  </main>

  <footer class="statusbar">
    <span>v1.0</span><span>STATE: LIVE</span><span>UPDATED 12:00</span>
  </footer>
</body>
</html>
